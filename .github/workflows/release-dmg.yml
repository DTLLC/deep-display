name: Release DMG

on:
  push:
    branches:
      - release

permissions:
  contents: write

jobs:
  release-dmg:
    runs-on: macos-latest
    env:
      BUNDLE_ID: bio.jas.DeepDisplay

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        run: |
          version="$(./scripts/read_version.sh)"
          build_version="${GITHUB_RUN_NUMBER}"
          release_tag="v${version}-build.${build_version}"
          release_title="Deep Display ${version} (${build_version})"
          dmg_name="Deep-Display-${version}+${build_version}.dmg"
          latest_dmg_name="Deep-Display-latest.dmg"
          {
            echo "DEEPDISPLAY_MARKETING_VERSION=${version}"
            echo "DEEPDISPLAY_BUILD_VERSION=${build_version}"
            echo "RELEASE_TAG=${release_tag}"
            echo "RELEASE_TITLE=${release_title}"
            echo "RELEASE_DMG_NAME=${dmg_name}"
            echo "LATEST_RELEASE_DMG_NAME=${latest_dmg_name}"
          } >> "${GITHUB_ENV}"

      - name: Make scripts executable
        run: chmod +x ./scripts/*.sh ./scripts/render_icon.swift

      - name: Install Codemagic CLI tools
        run: |
          python3 -m venv "${RUNNER_TEMP}/codemagic-cli-tools"
          "${RUNNER_TEMP}/codemagic-cli-tools/bin/python" -m pip install --upgrade pip
          "${RUNNER_TEMP}/codemagic-cli-tools/bin/python" -m pip install --upgrade codemagic-cli-tools
          echo "${RUNNER_TEMP}/codemagic-cli-tools/bin" >> "${GITHUB_PATH}"

      - name: Create temporary keychain password
        run: echo "KEYCHAIN_PASSWORD=$(uuidgen)" >> "${GITHUB_ENV}"

      - name: Set up signing keychain
        run: keychain initialize --password "@env:KEYCHAIN_PASSWORD"

      - name: Fetch Developer ID signing files
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APPLE_APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
          CERTIFICATE_PRIVATE_KEY: ${{ secrets.APPLE_MAC_DEVELOPER_ID_CERT_PRIVATE_KEY }}
        run: |
          export APP_STORE_CONNECT_PRIVATE_KEY="$(printf '%s' "${APP_STORE_CONNECT_PRIVATE_KEY_BASE64}" | /usr/bin/base64 -d)"
          app-store-connect fetch-signing-files "${BUNDLE_ID}" \
            --platform MAC_OS \
            --type MAC_APP_DIRECT \
            --create
          keychain add-certificates

      - name: Resolve Developer ID signing identity
        run: |
          identity="$(security find-identity -v -p codesigning | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)"
          if [[ -z "${identity}" ]]; then
            echo "No Developer ID Application signing identity found." >&2
            security find-identity -v -p codesigning >&2
            exit 1
          fi
          echo "DEEPDISPLAY_CODESIGN_IDENTITY=${identity}" >> "${GITHUB_ENV}"

      - name: Build signed DMG
        run: ./scripts/create_dmg.sh

      - name: Notarize and staple DMG
        env:
          APPLE_APP_STORE_CONNECT_KEY_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_KEY_ID }}
          APPLE_APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          key_path="${RUNNER_TEMP}/AuthKey_${APPLE_APP_STORE_CONNECT_KEY_ID}.p8"
          printf '%s' "${APPLE_APP_STORE_CONNECT_PRIVATE_KEY_BASE64}" | /usr/bin/base64 -d > "${key_path}"

          xcrun notarytool submit ".dist/${RELEASE_DMG_NAME}" \
            --key "${key_path}" \
            --key-id "${APPLE_APP_STORE_CONNECT_KEY_ID}" \
            --issuer "${APPLE_APP_STORE_CONNECT_ISSUER_ID}" \
            --wait

          xcrun stapler staple ".dist/${RELEASE_DMG_NAME}"
          xcrun stapler validate ".dist/${RELEASE_DMG_NAME}"

      - name: Prepare Homebrew DMG alias
        run: cp ".dist/${RELEASE_DMG_NAME}" ".dist/${LATEST_RELEASE_DMG_NAME}"

      - name: Stamp Homebrew cask
        run: |
          cask_sha256="$(shasum -a 256 ".dist/${LATEST_RELEASE_DMG_NAME}" | awk '{print $1}')"
          ./scripts/update_cask.sh \
            "${DEEPDISPLAY_MARKETING_VERSION}" \
            "${DEEPDISPLAY_BUILD_VERSION}" \
            "${cask_sha256}"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --target "${GITHUB_SHA}" \
            --title "${RELEASE_TITLE}" \
            --notes "Automated signed and notarized release from the release branch." \
            ".dist/${RELEASE_DMG_NAME}" \
            ".dist/${LATEST_RELEASE_DMG_NAME}"

      - name: Publish Homebrew cask update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          cask_sha256="$(shasum -a 256 ".dist/${LATEST_RELEASE_DMG_NAME}" | awk '{print $1}')"
          ./scripts/update_cask.sh \
            "${DEEPDISPLAY_MARKETING_VERSION}" \
            "${DEEPDISPLAY_BUILD_VERSION}" \
            "${cask_sha256}"
          if git diff --quiet -- Casks/deep-display.rb; then
            echo "Homebrew cask is already current."
            exit 0
          fi
          git add Casks/deep-display.rb
          git commit -m "Update Homebrew cask to ${DEEPDISPLAY_MARKETING_VERSION}+${DEEPDISPLAY_BUILD_VERSION}"
          git push origin main

      - name: Delete superseded patch releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./scripts/*.sh ./scripts/render_icon.swift
          ./scripts/cleanup_releases.sh
